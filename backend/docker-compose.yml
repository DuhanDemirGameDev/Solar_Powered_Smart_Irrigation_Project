version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smart_irrigation_db
    restart: always
    environment:
      POSTGRES_DB: smart_irrigation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - irrigation-net # <-- İkisine de aynı ağı ekledik

  pgadmin:
    image: dpage/pgadmin4
    container_name: smart_irrigation_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - irrigation-net # <-- İkisine de aynı ağı ekledik

volumes:
  postgres_data:

networks:
  irrigation-net:
    driver: bridge